name: Release to PyPI

# Triggers:
#   - Push a tag like `v3.0.1` to release that version.
#   - Or run manually from the Actions tab via workflow_dispatch.
#
# Required repository secret (Settings -> Secrets and variables -> Actions):
#   TWINE_TOKEN  -> your PyPI API token (starts with `pypi-`), scoped to the project.
#
# (The PyPI API-token convention requires the username to be the literal string
# `__token__`; this is hardcoded below, not a secret.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual release"
        required: false
        default: "Manual release"

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib,sys;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m build

      - name: Validate distributions with twine
        run: |
          python -m twine check dist/*

      - name: Smoke-test installed wheel in clean venv
        run: |
          python -m venv /tmp/sg_smoke
          /tmp/sg_smoke/bin/pip install --upgrade pip
          /tmp/sg_smoke/bin/pip install dist/*.whl
          /tmp/sg_smoke/bin/python -c "import subtitle_generator; print('import OK')"
          /tmp/sg_smoke/bin/subtitle --help > /dev/null

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/subtitle-generator/

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install twine
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Upload to PyPI
        env:
          # PyPI API-token auth: username is always literal `__token__`.
          # The repo secret is named TWINE_TOKEN; twine itself reads TWINE_PASSWORD.
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TWINE_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::error::Missing TWINE_TOKEN repository secret"
            exit 1
          fi
          python -m twine upload --non-interactive dist/*
